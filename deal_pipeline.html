function parseCity(address){
  const parts = address.split(',');
  return parts.length>=2 ? parts[1].trim() : '';
}

  const city = parseCity(address);
  return CITY_TO_COUNTY[city]||'Other';
}

  // Key decisions by address (stable across arv_engine reruns) with id as fallback

// --- Sync to Sheets ---
function setSyncStatus(status){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  if(!dot||!txt) return;
  const map={syncing:['#f59e0b','syncing...'],saved:['#22c55e','saved ✓'],error:['#ef4444','sync failed'],ready:['#22c55e','live'],loading:['#3b82f6','loading...']};
  const [color,text]=map[status]||map.ready;
  dot.style.background=color; txt.textContent=text;
  if(status==='saved') setTimeout(()=>setSyncStatus('ready'),2000);
}

async function syncToSheets(prop){
  setSyncStatus('syncing');
  try{
    await fetch(APPS_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        address:prop.address,
        stage:prop.stage,
        notes:prop.notes||'',
        decision:prop.decision||'',
        excludeReason:prop.excludeReason||''
      })
    });
    setSyncStatus('saved');
  } catch(e){
    setSyncStatus('error');
    console.error('Sync failed:',e);
  }
}

function updateState(id, changes){
  const p=PROPS.find(x=>x.id===id);
  const key=p?p.address:id;  // key by address — stable across arv_engine reruns
  decisions[key] = {...getState(id),...changes};
  saveLocal(decisions);
  const prop = getProp(id);
  if(prop) syncToSheets(prop);
  render();
}

// --- CSV Parser ---
function parseCSV(text){
  const lines = [];
  let line = [], field = '', inQuote = false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(c==='"'){
      if(inQuote&&text[i+1]==='"'){field+='"';i++;}
      else inQuote=!inQuote;
    } else if(c===','&&!inQuote){
      line.push(field.trim()); field='';
    } else if((c==='\n'||c==='\r')&&!inQuote){
      if(c==='\r'&&text[i+1]==='\n') i++;
      line.push(field.trim()); field='';
      if(line.some(f=>f!=='')) lines.push(line);
      line=[];
    } else {
      field+=c;
    }
  }
  if(field||line.length) { line.push(field.trim()); if(line.some(f=>f!=='')) lines.push(line); }
  return lines;
}

function csvToObjects(text){
  const rows = parseCSV(text);
  if(rows.length<2) return [];
  const headers = rows[0].map(h=>h.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''));
  return rows.slice(1).map(row=>{
    const obj={};
    headers.forEach((h,i)=>{ obj[h]=row[i]||''; });
    return obj;
  });
}

function sheetUrl(tabName){

  return `https://docs.google.com/spreadsheets/d/e/${PUBLISH_KEY}/pub?gid=${gid}&single=true&output=csv`;
}

async function loadPipelineData(){

  try{
    // Core pipeline tabs — fatal if these fail
    const [coreRes, luxRes, eddieCoreRes, eddieCoreLuxRes, stateRes] = await Promise.all([
      fetch(sheetUrl('Offers Core')),
      fetch(sheetUrl('Offers Luxury')),
      fetch(sheetUrl('Eddies Core')),
      fetch(sheetUrl('Eddies Luxury')),
      fetch(sheetUrl('Pipeline State')),
    ]);
    const [coreText, luxText, eddieCoreText, eddieCoreLuxText, stateText] = await Promise.all([
      coreRes.text(), luxRes.text(), eddieCoreRes.text(), eddieCoreLuxRes.text(), stateRes.text()
    ]);

    // Supplemental tabs — non-fatal, degrade gracefully if not yet published
    const safeFetch = async (tabName) => { try{ const r=await fetch(sheetUrl(tabName)); return await r.text(); }catch(e){ console.warn(tabName+' fetch failed:',e.message); return ''; }};
    const [fhText, premText, statsText, fpText, escriptText] = await Promise.all([
      safeFetch('Forever Home'),
      safeFetch('Premium Renovation'),
      safeFetch('Stats'),
      safeFetch('Full Pipeline'),
      safeFetch('Eddies Script'),
    ]);

    // Update Stats counters in header
    const statsRows = csvToObjects(statsText);
    if(statsRows.length>0){
      const s = statsRows[0];
      const repsEl = document.getElementById('reps-hours');
      const repsTarget = document.getElementById('reps-target');
      const offersTarget = document.getElementById('offers-target');
      if(repsEl) { repsEl.textContent = s.reps_hours||'30'; }
      if(repsTarget) { repsTarget.textContent = s.reps_target||'750'; }
      if(offersTarget) { offersTarget.textContent = s.offers_target||'10'; }
    }

    const coreRows    = csvToObjects(coreText);
    const luxRows     = csvToObjects(luxText);
    const eddieCore   = csvToObjects(eddieCoreText);
    const eddieLux    = csvToObjects(eddieCoreLuxText);
    const stateRows   = csvToObjects(stateText);
    const fhRows      = csvToObjects(fhText);
    const premRows    = csvToObjects(premText);
    const fpRows      = csvToObjects(fpText);
    const escriptRows = csvToObjects(escriptText);

    // Build Eddie Script data
    EDDIE_SCRIPT = escriptRows.map(r=>({
      rank:           parseInt(r.priority_rank)||99,
      label:          r.priority_label||'',
      address:        r.address||'',
      listPrice:      parseFloat(r.list_price)||0,
      arv:            parseFloat(r.arv)||0,
      maoMod:         parseFloat(r.mao_moderate)||0,
      gapToMao:       parseFloat(r.gap_to_mao)||0,
      gapPct:         parseFloat(r.gap_pct)||0,
      confidence:     r.arv_confidence||'',
      profitLight:    parseFloat(r.profit_light)||0,
      profitMod:      parseFloat(r.profit_moderate)||0,
      profitHeavy:    parseFloat(r.profit_heavy)||0,
      profitAtList:   parseFloat(r.profit_at_list)||0,
      motivations:    r.motivation_signals||'',
      motivationCount:parseInt(r.motivation_count)||0,
      zillowUrl:      r.zillow_url||'',
      q1:             r.question_1||'',
      q2:             r.question_2||'',
      q3:             r.question_3||'',
    })).filter(r=>r.address);

    // Build Eddie lookup
    const eddieMap = {};
    [...eddieCore, ...eddieLux].forEach(r=>{ if(r.address) eddieMap[r.address]=r; });

    // Build pipeline PROPS
    const seen = new Set();
    const allPipelineRows = [];
    coreRows.forEach(r=>{ if(r.address){ r._track='Core'; allPipelineRows.push(r); seen.add(r.address); }});
    luxRows.forEach(r=>{ if(r.address){ r._track='Luxury'; allPipelineRows.push(r); seen.add(r.address); }});
    eddieCore.forEach(r=>{ if(r.address&&!seen.has(r.address)){ r._track='Core'; r._eddieOnly=true; allPipelineRows.push(r); seen.add(r.address); }});
    eddieLux.forEach(r=>{ if(r.address&&!seen.has(r.address)){ r._track='Luxury'; r._eddieOnly=true; allPipelineRows.push(r); seen.add(r.address); }});

    PROPS = allPipelineRows.map((r,i)=>{
      const arv       = parseFloat(r.arv)||0;
      const listPrice = parseFloat(r.list_price)||0;
      const maoLight  = parseFloat(r.mao_light)||0;
      const maoMod    = parseFloat(r.mao_moderate)||0;
      const maoHeavy  = parseFloat(r.mao_heavy)||0;
      const profit    = parseFloat(r.profit_at_list)||0;
      const ppsf      = parseFloat(r.median_ppsf)||0;
      const compCount = parseInt(r.comp_count)||0;

        id:'p'+i, address:r.address, arv, listPrice, maoLight, maoMod, maoHeavy,
        profit, ppsf, compCount, confidence:r.arv_confidence||'Med',
        track:r._track||'Core', ianPriority:priority, eddieCall:eddie,
        propertyType:r.property_type||'', gapToMao:parseFloat(r.gap_to_mao)||null,
        sqft:parseInt(r.sqft)||0,
        rehabLight:parseFloat(r.rehab_light)||0,
        rehabMod:parseFloat(r.rehab_moderate)||0,
        rehabHeavy:parseFloat(r.rehab_heavy)||0,
        profitLight:parseFloat(r.profit_light)||0,

    // Build Forever Home PROPS
    FH_PROPS = fhRows.map((r,i)=>({
      id:'fh'+i, address:r.address,
      arv:parseFloat(r.arv)||0,
      listPrice:parseFloat(r.list_price)||0,
      confidence:r.arv_confidence||'Med',
      compCount:parseInt(r.comp_count)||0,
      ppsf:parseFloat(r.median_ppsf)||0,
      sqft:parseInt(r.sqft)||0,
      beds:parseInt(r.bedrooms)||0,
      baths:parseInt(r.full_baths)||0,
      propertyType:r.property_type||'',
      zip:r.zip||'', county:r.county||'',
      tier:r.tier||'A',
      zillowUrl:r.zillow_url||'',
      _type:'forever_home'
    }));

    // Build Premium Reno PROPS
    PREM_PROPS = premRows.map((r,i)=>({
      id:'pr'+i, address:r.address,
      zip:r.zip||'', county:r.county||'',
      sqft:parseInt(r.sqft)||0,
      listPrice:parseFloat(r.list_price)||0,
      arvStandard:parseFloat(r.arv_standard)||0,
      arvPremium:parseFloat(r.arv_premium)||0,
      renovationPremium:parseFloat(r.renovation_premium)||0,
      rehabBudget:parseFloat(r.heavy_rehab_budget)||0,
      allInCost:parseFloat(r.all_in_cost)||0,
      netProfit:parseFloat(r.net_profit)||0,
      captureRatio:parseFloat(r.premium_capture_ratio)||0,
      excellentComps:parseInt(r.excellent_comp_count)||0,
      confidence:r.arv_premium_confidence||'LOW',
      zillowUrl:r.zillow_url||'',
      inPipeline:false,
      _type:'premium_reno'
    }));

    // Build Full Pipeline PROPS — all scored properties, browse/explore only
    // Build a set of addresses already in main pipeline for promotion dedup
    const pipelineAddresses = new Set(PROPS.map(p=>p.address));
    FP_PROPS = fpRows.map((r,i)=>{
      const arv       = parseFloat(r.arv)||0;
      const listPrice = parseFloat(r.list_price)||0;
      const maoMod    = parseFloat(r.mao_moderate)||0;
      const profit    = parseFloat(r.profit_at_list)||0;
      const gap       = listPrice>0 ? Math.round(((listPrice-maoMod)/listPrice)*100) : 0;
      return {
        id:'fp'+i,
        address:r.address||'',
        arv, listPrice, maoMod,
        maoLight:  parseFloat(r.mao_light)||0,
        maoHeavy:  parseFloat(r.mao_heavy)||0,
        profit,
        gap,
        ppsf:      parseFloat(r.median_ppsf)||0,
        compCount: parseInt(r.comp_count)||0,
        confidence:r.arv_confidence||'Med',
        propertyType:r.property_type||'',
        city: parseCity(r.address||''),
        county: parseCounty(r.address||''),
        inPipeline: pipelineAddresses.has(r.address),
        sqft:       parseInt(r.sqft)||0,
        rehabLight: parseFloat(r.rehab_light)||0,
        rehabMod:   parseFloat(r.rehab_moderate)||0,
        rehabHeavy: parseFloat(r.rehab_heavy)||0,
        profitLight:parseFloat(r.profit_light)||0,
        profitHeavy:parseFloat(r.profit_heavy)||0,
        _type:'full_pipeline'
      };
    }).filter(p=>p.address);

    
    const stateMap={};
    stateRows.forEach(r=>{
      if(r.address) stateMap[r.address]={
        stage:r.stage||'review', notes:r.notes||'',
        decision:r.decision||'', excludeReason:r.excludereason||r.excludeReason||''
      };
    });

    PROPS.forEach(p=>{
      const sheetState = stateMap[p.address];
      if(sheetState&&sheetState.stage){
        const local = decisions[p.address]||{};
        decisions[p.address] = {
          stage:sheetState.stage,
          notes:sheetState.notes||local.notes||'',
          decision:sheetState.decision||local.decision||'',
          excludeReason:sheetState.excludeReason||local.excludeReason||''
        };
      }
    });

    saveLocal(decisions);
    dataLoaded=true;
    loadError=null;
    setSyncStatus('ready');
    document.getElementById('footer-left').textContent='Live · Google Sheets · '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  } catch(e){
    console.error('Pipeline load failed:',e);
    loadError=e.message;
    setSyncStatus('error');
    if(PROPS.length===0){
      document.getElementById('list').innerHTML=`
        <div class="error-banner">
          ⚠ Could not load pipeline data from Google Sheets.<br>
          Make sure the sheet is published: File → Share → Publish to web.<br>
          <span style="color:#64748b;font-size:10px">Error: ${e.message}</span>
        </div>
        <div class="empty">No cached data available.<br>Publish the sheet and refresh.</div>`;
      return;
    }
  }
  render();
}

// --- Lazy-load comps on first card expand ---
async function loadComps(){
  if(compsLoaded||compsLoading) return;
  if(TAB_GIDS['Pipeline Comps']==='0') return; // GID not set yet
  compsLoading=true;
  try{
    const r = await fetch(sheetUrl('Pipeline Comps'));
    const text = await r.text();
    const rows = csvToObjects(text);
    COMPS_MAP={};
    rows.forEach(r=>{
      const addr = r.subject_address;
      if(!addr) return;
      if(!COMPS_MAP[addr]) COMPS_MAP[addr]=[];
      COMPS_MAP[addr].push({
        compAddress: r.comp_address||'',
        salePrice:   parseFloat(r.sale_price)||0,
        sqft:        parseInt(r.sqft)||0,
        ppsf:        parseFloat(r.ppsf)||0,
        condition:   r.condition||'',
        distanceMi:  parseFloat(r.distance_mi)||0,
        saleDate:    r.sale_date||'',
      });
    });
    compsLoaded=true;
    compsLoading=false;
    render(); // re-render with comp data now available
  } catch(e){
    compsLoading=false;
    console.warn('Comps load failed:',e.message);
  }
}
function fmt(n){ const a=Math.abs(n); const s=n<0?'-':''; if(a>=1000000) return s+'$'+(a/1000000).toFixed(1).replace(/\.0$/,'')+'M'; if(a>=1000) return s+'$'+(a/1000).toFixed(0)+'K'; return s+'$'+Math.round(a); }
function fmtFull(n){ return '$'+Math.round(n).toLocaleString(); }
function profColor(p){ return p>=75000?'#22c55e':p>=40000?'#4ade80':p>=25000?'#f59e0b':'#ef4444'; }
function confColor(c){ return {High:'#22c55e',Med:'#f59e0b','Low-Adjusted':'#f97316',Low:'#ef4444'}[c]||'#94a3b8'; }
function zillowUrl(addr){ return 'https://www.zillow.com/homes/'+encodeURIComponent(addr)+'_rb/'; }
function gapInfo(p){
  const gap=p.listPrice-p.maoMod;
  const pct=p.listPrice>0?Math.round((gap/p.listPrice)*100):0;
  return {gap,pct,verdict:pct<=15?'NEGOTIABLE':pct<=25?'STRETCH':'PASS',color:pct<=15?'#4ade80':pct<=25?'#f59e0b':'#f87171'};
}
function callScript(p){
  const g=gapInfo(p);
  return [
    `We're looking at ${p.address.split(',')[0]}. ARV around ${fmt(p.arv)}, list at ${fmt(p.listPrice)} leaves thin margin. Is the seller open below list?`,
    `Any known issues — roof, mechanicals, foundation, water? Need to price accurately.`,
    g.pct>15?`We'd need around ${fmt(p.maoMod)} to make the numbers work. Can the seller consider that range?`:`Our range is ${fmt(p.maoMod)}–${fmt(p.maoLight)}. Can we schedule a showing?`
  ];
}

function getList(){
  if(activeStage==='forever_home') return FH_PROPS.slice().sort((a,b)=>a.tier.localeCompare(b.tier)||(b.arv-a.arv));
  if(activeStage==='premium_reno') return PREM_PROPS.slice().sort((a,b)=>b.netProfit-a.netProfit);
  if(activeStage==='eddie_brief'){
    let eb = EDDIE_SCRIPT.slice();
    if(eddieBriefFilter==='eddie') eb=eb.filter(p=>p.label==='PRIORITY'||p.label==='EDDIE');
    if(eddieBriefFilter==='signal') eb=eb.filter(p=>p.motivationCount>=2);
    return eb.sort((a,b)=>a.rank-b.rank);
  }
  if(activeStage==='full_pipeline'){
    let list = FP_PROPS.slice();
    if(fpConfFilter!=='All') list=list.filter(p=>p.confidence===fpConfFilter);
    if(fpTypeFilter!=='All') list=list.filter(p=>p.propertyType.toLowerCase().includes(fpTypeFilter.toLowerCase()));
    if(fpProfitFilter==='pos')    list=list.filter(p=>p.profit>0);
    if(fpProfitFilter==='30k')    list=list.filter(p=>p.profit>=30000);
    if(fpProfitFilter==='neg')    list=list.filter(p=>p.profit<=0);
    if(fpCountyFilter!=='All') list=list.filter(p=>p.county===fpCountyFilter);
    if(fpCityFilter!=='All') list=list.filter(p=>p.city===fpCityFilter);
    list.sort((a,b)=>fpSortBy==='profit'?(b.profit-a.profit):fpSortBy==='gap'?(a.gap-b.gap):(b.listPrice-a.listPrice));
    return list;
  }
  return allProps()
    .filter(p=>p.stage===activeStage&&(trackFilter==='All'||p.track===trackFilter))
    .sort((a,b)=>sortBy==='profit'?(b.profit-a.profit):sortBy==='gap'?((a.listPrice-a.maoMod)/Math.max(a.listPrice,1)-(b.listPrice-b.maoMod)/Math.max(b.listPrice,1)):(b.listPrice-a.listPrice));
}
function countStage(s){
  if(s==='forever_home') return FH_PROPS.length;
  if(s==='premium_reno') return PREM_PROPS.length;
  if(s==='full_pipeline') return FP_PROPS.length;
  if(s==='eddie_brief') return EDDIE_SCRIPT.length;
  return allProps().filter(p=>p.stage===s).length;
}
function offerCount(){ return allProps().filter(p=>p.decision==='Submit Offer').length; }

    [p.confidence,confColor(p.confidence)],
    [p.track,p.track==='Core'?'#64748b':'#a78bfa'],
    [g.verdict,g.color],
    ...(p.eddieCall&&p.stage==='review'?[['EDDIE','#06b6d4']]:isWatch?[['WATCHING','#f59e0b']]:p.decision?[[p.decision,'#60a5fa']]:[])
  ].map(([l,c])=>`<span class="tag" style="background:${c}22;color:${c};border-color:${c}44">${l}</span>`).join('');

  let detail='';
  if(isExp){
    const cells=[

      ['MAO Light',fmtFull(p.maoLight),'#64748b'],['MAO Heavy',fmtFull(p.maoHeavy),'#64748b'],
      ['Profit',fmt(p.profit),profColor(p.profit)],['PPSF','$'+p.ppsf.toFixed(0),'#64748b'],

    ].map(([l,v,c])=>`<div class="cell"><div class="cell-lbl">${l}</div><div class="cell-val" style="color:${c}">${v}</div></div>`).join('');

    const vb=g.pct<=15?'#14532d':g.pct<=25?'#451a03':'#450a0a';

function doExclude(id){
  const reason=document.getElementById('excl-reason').value;
  if(!reason) return;
  const note=document.getElementById('excl-note').value;
  // If this is a FP/Prem property not yet in PROPS, promote it first so updateState has a target
  if(!PROPS.find(x=>x.id===id)){
    const fp=FP_PROPS.find(x=>x.id===id);
    const pm=PREM_PROPS.find(x=>x.id===id);
    const src=fp||pm;
    if(src && !PROPS.find(x=>x.address===src.address)){
      const newProp={
        id:'pp'+PROPS.length, address:src.address,
        arv:src.arv||src.arvPremium||0, listPrice:src.listPrice,
        maoLight:src.maoLight||null, maoMod:src.maoMod||null, maoHeavy:src.maoHeavy||null,
        profit:src.profit||src.netProfit||0, ppsf:src.ppsf||null, compCount:src.compCount||src.excellentComps||0,
        confidence:src.confidence, track:'Core', ianPriority:false,
        eddieCall:false, propertyType:src.propertyType||'Single-Family', gapToMao:null,
        sqft:src.sqft||0,
        rehabLight:src.rehabLight||0, rehabMod:src.rehabMod||0, rehabHeavy:src.rehabHeavy||0,
        profitLight:src.profitLight||0, profitHeavy:src.profitHeavy||0,
        _type:'pipeline'
      };
      PROPS.push(newProp);
      src.inPipeline=true;
      id=newProp.id;
    }
  }
  updateState(id,{stage:'archived',excludeReason:reason,notes:note,decision:'Excluded'});
  closeModal();
}

function openDecision(id){
  const p=getProp(id);
  if(!p) return;
  const modal=document.getElementById('modal');
  modal.style.display='flex';
  modal.innerHTML=`<div class="modal">
    <div style="font-size:13px;font-weight:600;color:#f1f5f9;margin-bottom:5px">Log Decision</div>

function doDecision(id,decision){
  if(decision==='Exclude'){closeModal();openExclude(id);return;}
  const stage=decision==='Watch List'?'watchlist':'decision';
  updateState(id,{stage,decision});
  closeModal();
}

function copyEddieBrief(){
  let list = EDDIE_SCRIPT.slice();
  if(eddieBriefFilter==='eddie') list = list.filter(p=>p.label==='PRIORITY'||p.label==='EDDIE');
  if(eddieBriefFilter==='signal') list = list.filter(p=>p.motivationCount>=2);
  list.sort((a,b)=>a.rank-b.rank);
  const fmtK = v => {const a=Math.abs(Math.round(v));return '$'+(v<0?'-':'')+(a>=1000?(a/1000).toFixed(0)+'K':a.toLocaleString());};
  const lines = [`Eddie's Call List — ${new Date().toLocaleDateString()}`, `${list.length} properties`, ''];
  list.forEach((p,i)=>{
    const city = parseCity(p.address);
    const street = p.address.split(',')[0];
    lines.push(`${i+1}. ${street}, ${city}`);
    lines.push(`   List ${fmtK(p.listPrice)} · ARV ${fmtK(p.arv)} · MAO ${fmtK(p.maoMod)} · Gap ${p.gapPct.toFixed(0)}%`);
    if(p.motivations) lines.push(`   Signals: ${p.motivations}`);
    const note = eddieBriefNotes[p.address];
    if(note) lines.push(`   Notes: ${note}`);
    lines.push('');
  });
  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const btn=document.querySelector('.fbtn[onclick*="copyEddieBrief"]');
    if(btn){const orig=btn.textContent;btn.textContent='✓ Copied!';setTimeout(()=>btn.textContent=orig,2000);}
  });
}

function setFpFilter(type, val){
  if(type==='profit') fpProfitFilter=val;
  else if(type==='conf') fpConfFilter=val;
  else if(type==='type') fpTypeFilter=val;
  else if(type==='sort') fpSortBy=val;
  else if(type==='county'){ fpCountyFilter=val; fpCityFilter='All'; } // reset city when county changes
  else if(type==='city') fpCityFilter=val;
  render();
}

function promoteToPipeline(id){
  const p = FP_PROPS.find(x=>x.id===id);
  if(!p) return;
  // Add to PROPS if not already present
  if(!PROPS.find(x=>x.address===p.address)){
    const newProp = {
      id:'pp'+PROPS.length, address:p.address,
      arv:p.arv, listPrice:p.listPrice,
      maoLight:p.maoLight, maoMod:p.maoMod, maoHeavy:p.maoHeavy,
      profit:p.profit, ppsf:p.ppsf, compCount:p.compCount,
      confidence:p.confidence, track:'Core', ianPriority:false,
      eddieCall:false, propertyType:p.propertyType, gapToMao:null,
      sqft:p.sqft,
      rehabLight:p.rehabLight, rehabMod:p.rehabMod, rehabHeavy:p.rehabHeavy,
      profitLight:p.profitLight, profitHeavy:p.profitHeavy,
      _type:'pipeline'
    };
    PROPS.push(newProp);
    p.inPipeline=true;
    updateState(newProp.id, {stage:'review'});
  }
  render();
}

function renderFPCard(p){
  const isExp = expanded===p.id;
  const fpStateTop=decisions[p.address]||{};
  const isExcludedTop=fpStateTop.decision==='Excluded';
  const profitColor = p.profit>=75000?'#22c55e':p.profit>=30000?'#4ade80':p.profit>=0?'#f59e0b':'#ef4444';
  const gapColor = p.gap<=15?'#4ade80':p.gap<=25?'#f59e0b':'#f87171';
  const gapLabel = p.gap<=15?'NEGOTIABLE':p.gap<=25?'STRETCH':'PASS';

  let detail='';
  if(isExp){
    const cells=[
      ['List Price',   fmtFull(p.listPrice),   '#94a3b8'],
      ['ARV',          fmtFull(p.arv),          '#e2e8f0'],
      ['MAO Moderate', fmtFull(p.maoMod),       '#60a5fa'],
      ['Profit @ List',fmt(p.profit),           profitColor],
      ['Gap to MAO',   p.gap+'%',               gapColor],
      ['Sqft',         p.sqft>0?p.sqft.toLocaleString():'—', '#64748b'],
      ['$/sqft',       '$'+p.ppsf.toFixed(0),  '#64748b'],
      ['Comps',        p.compCount+'',          '#64748b'],
      ['Type',         p.propertyType||'—',    '#64748b'],
    ].map(([l,v,c])=>`<div class="cell"><div class="cell-lbl">${l}</div><div class="cell-val" style="color:${c}">${v}</div></div>`).join('');
    const zilBtn=`<a href="${zillowUrl(p.address)}" target="_blank" class="btn" style="border-color:#1d4ed8;color:#60a5fa;background:#1e3a5f22">↗ Zillow</a>`;
    const fpState=decisions[p.address]||{};
    const isExcluded=fpState.decision==='Excluded';
    const promoteBtn = isExcluded
      ? `<button class="btn" style="border-color:#7f1d1d;color:#f87171;cursor:default">✓ Excluded</button>`
      : p.inPipeline
      ? `<button class="btn" style="border-color:#334155;color:#475569;cursor:default">✓ In Pipeline</button>`
      : `<button class="btn" style="border-color:#166534;color:#4ade80;background:#14532d22" onclick="event.stopPropagation();promoteToPipeline('${p.id}')">→ Add to Review Queue</button>`;
    const exclBtn=isExcluded?'':`<button class="btn" style="border-color:#7f1d1d;color:#f87171;background:#7f1d1d22" onclick="event.stopPropagation();openExclude('${p.id}')">✕ Exclude</button>`;
    detail=`<div class="detail">
      <div class="grid4">${cells}</div>
      ${compsTable(p.address)}
      ${p.sqft>0&&p.rehabMod>0?rehabTable(p):''}
      <div class="actions">${zilBtn}${promoteBtn}${exclBtn}</div>
    </div>`;
  }

  return `<div class="card${p.inPipeline?' priority':''}" id="card-${p.id}">
    <div class="card-row" onclick="toggleExpand('${p.id}')">
      <div class="profit-col">
        <div style="font-size:13px;font-weight:600;color:${profitColor}">${fmt(p.profit)}</div>
        <div style="font-size:9px;color:#334155;margin-top:1px">profit</div>
      </div>
      <div class="addr-col">
        <div class="addr">${p.address}</div>
        <div class="addr-sub">List ${fmt(p.listPrice)} · ARV ${fmt(p.arv)} · MAO ${fmt(p.maoMod)} · Gap ${p.gap}% · ${p.city||''}</div>
      </div>
      <div class="tags">
        <span class="tag" style="background:${confColor(p.confidence)}22;color:${confColor(p.confidence)};border-color:${confColor(p.confidence)}44">${p.confidence}</span>
        <span class="tag" style="background:${gapColor}22;color:${gapColor};border-color:${gapColor}44">${gapLabel}</span>
        ${isExcludedTop?`<span class="tag" style="background:#7f1d1d22;color:#f87171;border-color:#7f1d1d44">EXCLUDED</span>`:p.inPipeline?`<span class="tag" style="background:#1e3a5f;color:#60a5fa;border-color:#3b82f644">IN PIPELINE</span>`:''}
      </div>
      <div style="color:#334155;font-size:10px;flex-shrink:0">${isExp?'▲':'▼'}</div>
    </div>
    ${detail}
  </div>`;
}

// Boot
loadPipelineData();
</script>
</body>
